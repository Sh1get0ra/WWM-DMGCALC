<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sidebar Wuxia Design Sample</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #ede4d0;
  --paper-mute: #b5a989;
  --paper-dim: #8a7e63;
  --gold: #c9a45a;
  --gold-bright: #f0d28a;
  --gold-deep: #8a6a20;
  --vermilion: #e8513a;
  --vermilion-deep: #8a1f17;
  --bg-1: #0a0608;
  --bg-2: #14100c;
  --surf-1: #1a1410;
  --surf-2: #15110d;
  --ink-1: #2a1f16;
  --ink-2: #1f160e;
  --jade: #a8d4b4;
  --f-latin: 'Cinzel', serif;
  --f-display: 'Noto Serif JP', serif;
  --f-sans: 'Noto Sans JP', sans-serif;
  --f-mono: 'Rajdhani', monospace;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 24px;
  background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
  color: var(--paper);
  font-family: var(--f-sans);
  min-height: 100vh;
  display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap;
}
.label-col {
  font-family: var(--f-mono); color: var(--gold-bright); font-weight: 700;
  letter-spacing: 0.18em; font-size: 12px;
  margin-bottom: 8px;
}

/* ── サンプル A: フル武侠化 ── */
.sb-wuxia {
  width: 300px;
  background:
    radial-gradient(ellipse at top right, rgba(232,81,58,0.04), transparent 55%),
    linear-gradient(180deg, var(--surf-1), var(--surf-2));
  border: 1px solid var(--gold-deep);
  padding: 16px;
  position: relative;
  display: flex; flex-direction: column; gap: 14px;
}
.sb-wuxia::before, .sb-wuxia::after,
.sb-wuxia .l-bl, .sb-wuxia .l-br {
  content: ''; position: absolute;
  width: 12px; height: 12px;
  border: 1.5px solid var(--gold-deep);
  pointer-events: none;
}
.sb-wuxia::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
.sb-wuxia::after  { top: 4px; right: 4px; border-left: none; border-bottom: none; }
.sb-wuxia .l-bl   { bottom: 4px; left: 4px; border-right: none; border-top: none; }
.sb-wuxia .l-br   { bottom: 4px; right: 4px; border-left: none; border-top: none; }

.sb-header {
  display: flex; gap: 12px; align-items: center;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(201,164,90,0.2);
  position: relative;
}
.sb-header::after {
  content: '';
  position: absolute; bottom: -2px; left: 12%; right: 12%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--vermilion), transparent);
  opacity: 0.35; filter: blur(.6px);
}
.sb-avatar {
  width: 52px; height: 52px; border-radius: 50%;
  border: 2px solid var(--gold-deep);
  box-shadow: 0 0 8px rgba(232,210,138,0.25);
  background: var(--bg-1);
  flex-shrink: 0;
}
.sb-info { flex: 1; min-width: 0; }
.sb-charname {
  font-family: var(--f-display);
  font-size: 14px; font-weight: 700;
  color: var(--paper);
  letter-spacing: 0.04em;
}
.sb-charname .lv { color: var(--paper-mute); font-weight: 400; font-size: 11px; margin-left: 4px; }
.sb-power {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--paper-mute); letter-spacing: 0.12em; text-transform: uppercase;
  margin-top: 4px;
}
.sb-power b { color: var(--gold); font-size: 13px; margin-left: 4px; font-weight: 700; }
.sb-martial {
  display: flex; align-items: baseline; gap: 6px;
  margin-top: 6px;
}
.sb-martial .lbl {
  font-family: var(--f-display); font-size: 11px;
  color: var(--vermilion); font-weight: 700;
  letter-spacing: 0.1em;
}
.sb-martial .val {
  font-family: var(--f-latin); font-size: 22px; font-weight: 900;
  color: var(--paper);
  line-height: 1; letter-spacing: -.01em;
}
.sb-tier {
  font-family: var(--f-latin); font-size: 11px; font-weight: 900;
  letter-spacing: 0.1em; padding: 2px 8px;
  border: 1px solid;
  background: linear-gradient(135deg, rgba(180,40,28,.48), rgba(100,20,14,.38), rgba(180,40,28,.48));
  border-color: rgba(240,210,138,.65);
  color: #f0d28a;
  text-shadow: 0 0 12px rgba(240,210,138,0.8);
  box-shadow: 0 0 8px rgba(200,60,43,0.4), inset 0 1px 0 rgba(240,210,138,0.2);
}

.sb-section { display: flex; flex-direction: column; gap: 4px; }
.sb-section-title {
  font-family: var(--f-mono);
  font-size: 10px; font-weight: 700;
  color: var(--gold-bright);
  letter-spacing: 0.28em; text-transform: uppercase;
  margin: 0; padding: 4px 0 6px;
  cursor: pointer;
  border-bottom: 1px solid rgba(201,164,90,0.18);
  display: flex; align-items: center; gap: 8px;
}
.sb-section-title::before {
  content: ''; width: 3px; height: 12px;
  background: var(--vermilion); flex-shrink: 0;
  box-shadow: 0 0 4px rgba(232,81,58,0.6);
}
.sb-section-title .ja {
  font-family: var(--f-display); font-size: 12px;
  color: var(--paper); font-weight: 900; letter-spacing: 0.06em;
  text-transform: none;
}
.sb-section-title .arr {
  margin-left: auto; color: var(--gold-deep); font-size: 9px;
}

.sb-items { display: flex; flex-direction: column; gap: 2px; padding: 4px 2px 8px; }
.sb-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  padding: 4px 6px;
  border-bottom: 1px dashed rgba(201,164,90,0.08);
}
.sb-row:hover { background: rgba(232,210,138,0.04); }
.sb-row-label { color: var(--paper-mute); flex: 1; min-width: 0; }
.sb-row-val { color: var(--paper); font-family: var(--f-mono); font-weight: 700; font-size: 12px; }
.sb-row-val .baseline {
  color: var(--paper-dim); font-weight: 500; font-size: 10px; margin-right: 3px;
  text-decoration: line-through; text-decoration-color: rgba(201,164,90,0.4);
}
.sb-row-val .arrow { color: var(--gold-deep); margin: 0 3px; font-size: 9px; }
.sb-row-val .cur { color: var(--gold-bright); }

/* ── サンプル B: ライト武侠化 ── */
.sb-light {
  width: 300px;
  background: linear-gradient(180deg, var(--surf-1), var(--surf-2));
  border: 1px solid var(--gold-deep);
  padding: 14px;
  display: flex; flex-direction: column; gap: 12px;
}
.sb-light .sb-section-title { letter-spacing: 0.2em; }

/* ── サンプル C: mini-hero header 分離 ── */
.sb-mini-hero { width: 300px; display: flex; flex-direction: column; gap: 8px; }
.sb-mini-hero-card {
  background:
    radial-gradient(ellipse at top right, rgba(240,210,138,0.06), transparent 55%),
    linear-gradient(180deg, var(--surf-1), var(--surf-2));
  border: 1px solid var(--gold-deep);
  padding: 14px;
  position: relative; overflow: hidden;
}
.sb-mini-hero-card::before, .sb-mini-hero-card::after,
.sb-mini-hero-card .l-bl, .sb-mini-hero-card .l-br {
  content: ''; position: absolute;
  width: 10px; height: 10px;
  border: 1.5px solid var(--gold-deep);
  pointer-events: none;
}
.sb-mini-hero-card::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
.sb-mini-hero-card::after  { top: 4px; right: 4px; border-left: none; border-bottom: none; }
.sb-mini-hero-card .l-bl   { bottom: 4px; left: 4px; border-right: none; border-top: none; }
.sb-mini-hero-card .l-br   { bottom: 4px; right: 4px; border-left: none; border-top: none; }
.sb-mini-hero-ink {
  position: absolute; bottom: -15px; left: -20px;
  width: 200px; height: 60px;
  background: linear-gradient(90deg, rgba(232,81,58,0.0), rgba(232,81,58,0.18), rgba(232,81,58,0.0));
  filter: blur(8px);
  border-radius: 50%;
  pointer-events: none;
}
.sb-rest {
  background: linear-gradient(180deg, var(--surf-1), var(--surf-2));
  border: 1px solid var(--ink-1);
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}
</style>
</head>
<body>

<div>
  <div class="label-col">A · FULL WUXIA</div>
  <div class="sb-wuxia">
    <span class="l-bl"></span><span class="l-br"></span>
    <div class="sb-header">
      <div class="sb-avatar"></div>
      <div class="sb-info">
        <div class="sb-charname">茂寅 <span class="lv">Lv95</span></div>
        <div class="sb-power">総合武力 <b>30,735</b></div>
        <div class="sb-martial">
          <span class="lbl">武格</span>
          <span class="val">10,945</span>
          <span class="sb-tier">SS</span>
        </div>
      </div>
    </div>
    <div class="sb-section">
      <h3 class="sb-section-title"><span class="ja">基礎値</span><span class="arr">▼</span></h3>
      <div class="sb-items">
        <div class="sb-row"><span class="sb-row-label">体</span><span class="sb-row-val">129</span></div>
        <div class="sb-row"><span class="sb-row-label">力</span><span class="sb-row-val">129</span></div>
        <div class="sb-row"><span class="sb-row-label">防</span><span class="sb-row-val">129</span></div>
        <div class="sb-row"><span class="sb-row-label">速</span><span class="sb-row-val">310</span></div>
        <div class="sb-row"><span class="sb-row-label">会</span><span class="sb-row-val"><span class="baseline">129</span><span class="arrow">▶</span><span class="cur">165</span></span></div>
      </div>
    </div>
    <div class="sb-section">
      <h3 class="sb-section-title"><span class="ja">判定確率</span><span class="arr">▼</span></h3>
      <div class="sb-items">
        <div class="sb-row"><span class="sb-row-label">命中率</span><span class="sb-row-val">116.9%</span></div>
        <div class="sb-row"><span class="sb-row-label">会心率</span><span class="sb-row-val"><span class="baseline">107.1%</span><span class="arrow">▶</span><span class="cur">85.8%</span></span></div>
        <div class="sb-row"><span class="sb-row-label">会意率</span><span class="sb-row-val">25.6%</span></div>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label-col">B · LIGHT WUXIA</div>
  <div class="sb-light">
    <div class="sb-header">
      <div class="sb-avatar"></div>
      <div class="sb-info">
        <div class="sb-charname">茂寅 <span class="lv">Lv95</span></div>
        <div class="sb-power">総合武力 <b>30,735</b></div>
        <div class="sb-martial">
          <span class="lbl">武格</span>
          <span class="val">10,945</span>
          <span class="sb-tier">SS</span>
        </div>
      </div>
    </div>
    <div class="sb-section">
      <h3 class="sb-section-title"><span class="ja">基礎値</span><span class="arr">▼</span></h3>
      <div class="sb-items">
        <div class="sb-row"><span class="sb-row-label">体</span><span class="sb-row-val">129</span></div>
        <div class="sb-row"><span class="sb-row-label">力</span><span class="sb-row-val">129</span></div>
        <div class="sb-row"><span class="sb-row-label">会</span><span class="sb-row-val"><span class="baseline">129</span><span class="arrow">▶</span><span class="cur">165</span></span></div>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label-col">C · MINI-HERO HEADER</div>
  <div class="sb-mini-hero">
    <div class="sb-mini-hero-card">
      <span class="l-bl"></span><span class="l-br"></span>
      <div class="sb-mini-hero-ink"></div>
      <div class="sb-header" style="border:none;padding:0;">
        <div class="sb-avatar"></div>
        <div class="sb-info">
          <div class="sb-charname">茂寅 <span class="lv">Lv95</span></div>
          <div class="sb-power">総合武力 <b>30,735</b></div>
          <div class="sb-martial">
            <span class="lbl">武格</span>
            <span class="val">10,945</span>
            <span class="sb-tier">SS</span>
          </div>
        </div>
      </div>
    </div>
    <div class="sb-rest">
      <div class="sb-section">
        <h3 class="sb-section-title"><span class="ja">基礎値</span><span class="arr">▼</span></h3>
        <div class="sb-items">
          <div class="sb-row"><span class="sb-row-label">体</span><span class="sb-row-val">129</span></div>
          <div class="sb-row"><span class="sb-row-label">力</span><span class="sb-row-val">129</span></div>
          <div class="sb-row"><span class="sb-row-label">会</span><span class="sb-row-val"><span class="baseline">129</span><span class="arrow">▶</span><span class="cur">165</span></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
